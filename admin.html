<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin · J&H Wedding RSVPs</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --burgundy:    #6b1a2a;
      --burgundy-dk: #3d0a14;
      --silver:      #d4af8a;
      --cream:       #fdf6ee;
      --text:        #2a0a10;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #f5f0eb;
      color: var(--text);
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(150deg, var(--burgundy-dk), #5a1020);
    }

    .login-box {
      background: #fff;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-box h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-style: italic;
      color: var(--burgundy-dk);
      margin-bottom: 6px;
    }

    .login-box p {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: #9a6a6a;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .login-box input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(107,26,42,0.2);
      background: var(--cream);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      outline: none;
      margin-bottom: 14px;
      letter-spacing: 0.1em;
    }

    .login-box input:focus { border-color: var(--burgundy); }

    .login-box button {
      width: 100%;
      padding: 14px;
      background: var(--burgundy-dk);
      color: #fff;
      border: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s;
    }

    .login-box button:hover { background: var(--burgundy); }
    .login-error { color: #c0392b; font-size: 0.72rem; margin-top: 10px; min-height: 18px; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; }

    header {
      background: var(--burgundy-dk);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-style: italic;
      color: #fff;
    }

    header span { color: var(--silver); margin: 0 8px; }

    .logout-btn {
      background: none;
      border: 1px solid rgba(212,175,138,0.4);
      color: var(--silver);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 8px 18px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .logout-btn:hover { background: rgba(212,175,138,0.1); }

    .dashboard-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 36px 24px;
    }

    /* ── STAT CARDS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: #fff;
      border: 1px solid rgba(107,26,42,0.08);
      padding: 24px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }

    .stat-card.total::before    { background: var(--silver); }
    .stat-card.attending::before { background: #2ecc71; }
    .stat-card.declined::before  { background: #e74c3c; }
    .stat-card.afar::before      { background: #9b59b6; }
    .stat-card.guests::before    { background: var(--burgundy); }

    .stat-icon { font-size: 1.6rem; margin-bottom: 8px; }

    .stat-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      font-weight: 300;
      color: var(--burgundy-dk);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #9a6a6a;
      margin-top: 6px;
    }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      padding: 8px 18px;
      border: 1px solid rgba(107,26,42,0.2);
      background: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      color: var(--text);
    }

    .filter-btn.active, .filter-btn:hover {
      background: var(--burgundy-dk);
      color: #fff;
      border-color: var(--burgundy-dk);
    }

    .search-box {
      margin-left: auto;
      padding: 8px 14px;
      border: 1px solid rgba(107,26,42,0.2);
      background: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      outline: none;
      width: 220px;
    }

    .search-box:focus { border-color: var(--burgundy); }

    /* ── TABLE ── */
    .table-wrap {
      background: #fff;
      border: 1px solid rgba(107,26,42,0.08);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }

    thead tr {
      background: var(--burgundy-dk);
      color: var(--silver);
    }

    thead th {
      padding: 14px 16px;
      text-align: left;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-size: 0.6rem;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid rgba(107,26,42,0.06);
      transition: background 0.2s;
    }

    tbody tr:hover { background: #fdf6ee; }

    tbody td {
      padding: 14px 16px;
      vertical-align: top;
      line-height: 1.6;
      color: #4a2a2a;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      white-space: nowrap;
    }

    .badge.yes      { background: #d5f5e3; color: #1e8449; }
    .badge.no       { background: #fadbd8; color: #922b21; }
    .badge.afar     { background: #e8daef; color: #6c3483; }

    .no-data {
      text-align: center;
      padding: 60px 20px;
      color: #9a6a6a;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #9a6a6a;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .refresh-btn {
      background: none;
      border: 1px solid rgba(107,26,42,0.2);
      color: var(--burgundy);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 8px 18px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .refresh-btn:hover { background: var(--burgundy-dk); color: #fff; border-color: var(--burgundy-dk); }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .table-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-style: italic;
      color: var(--burgundy-dk);
    }

    .last-updated {
      font-size: 0.6rem;
      color: #9a6a6a;
      letter-spacing: 0.1em;
    }

    @media (max-width: 600px) {
      .dashboard-inner { padding: 20px 14px; }
      header { padding: 16px 18px; }
      .search-box { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <h1>J <span style="color:var(--silver)">♥</span> H</h1>
      <p>Admin · RSVP Dashboard</p>
      <input type="password" id="password-input" placeholder="Enter password" />
      <button onclick="login()">Enter Dashboard</button>
      <p class="login-error" id="login-error"></p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <header>
      <h1>Jason <span>♥</span> Hosanna · RSVP Dashboard</h1>
      <div style="display:flex;gap:12px;align-items:center;">
        <span class="last-updated" id="last-updated"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </header>

    <div class="dashboard-inner">

      <!-- STATS -->
      <div class="stats">
        <div class="stat-card total">
          <div class="stat-icon">📋</div>
          <div class="stat-number" id="stat-total">—</div>
          <div class="stat-label">Total Responses</div>
        </div>
        <div class="stat-card attending">
          <div class="stat-icon">✅</div>
          <div class="stat-number" id="stat-attending">—</div>
          <div class="stat-label">Attending</div>
        </div>
        <div class="stat-card declined">
          <div class="stat-icon">❌</div>
          <div class="stat-number" id="stat-declined">—</div>
          <div class="stat-label">Can't Make It</div>
        </div>
        <div class="stat-card afar">
          <div class="stat-icon">🌸</div>
          <div class="stat-number" id="stat-afar">—</div>
          <div class="stat-label">From Afar</div>
        </div>
        <div class="stat-card guests">
          <div class="stat-icon">👥</div>
          <div class="stat-number" id="stat-guests">—</div>
          <div class="stat-label">Total Guests</div>
        </div>
      </div>

      <!-- TABLE -->
      <div class="table-header">
        <span class="table-title">All Responses</span>
        <button class="refresh-btn" onclick="loadRSVPs()">↻ Refresh</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('yes', this)">Attending</button>
        <button class="filter-btn" onclick="setFilter('no', this)">Can't Make It</button>
        <button class="filter-btn" onclick="setFilter('afar', this)">From Afar</button>
        <input class="search-box" type="text" placeholder="Search by name..." oninput="renderTable()" id="search-input"/>
      </div>

      <div class="table-wrap">
        <div class="loading" id="table-loading">Loading responses...</div>
        <table id="rsvp-table" style="display:none">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Party Members</th>
              <th>Attendance</th>
              <th>Phone</th>
              <th>Address</th>
              <th>Children</th>
              <th>Submitted</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
        <div class="no-data" id="no-data" style="display:none">No responses yet.</div>
      </div>

    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://tfgakletdbgzoaothego.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmZ2FrbGV0ZGJnem9hb3RoZWdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODc3NjQsImV4cCI6MjA5NTI2Mzc2NH0.z2nXxusC4LQGZhfWNdD1rvUnI4gUGNWKx2WkClUV3Ms';
    const ADMIN_PASS   = 'JasonHozi2026';

    let allData    = [];
    let activeFilter = 'all';

    function login() {
      const val = document.getElementById('password-input').value;
      if (val === ADMIN_PASS) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display    = 'block';
        loadRSVPs();
      } else {
        document.getElementById('login-error').textContent = 'Incorrect password.';
      }
    }

    document.getElementById('password-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    function logout() {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('dashboard').style.display    = 'none';
      document.getElementById('password-input').value       = '';
    }

    async function loadRSVPs() {
      document.getElementById('table-loading').style.display = 'block';
      document.getElementById('rsvp-table').style.display    = 'none';
      document.getElementById('no-data').style.display       = 'none';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rsvps?select=*&order=created_at.desc`, {
          headers: {
            'apikey':        SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });
        allData = await res.json();
        updateStats();
        renderTable();
        document.getElementById('last-updated').textContent =
          'Updated: ' + new Date().toLocaleTimeString();
      } catch {
        document.getElementById('table-loading').textContent = 'Failed to load. Check connection.';
      }
    }

    function updateStats() {
      const attending = allData.filter(r => r.attendance === "Yes, I'll be there");
      const declined  = allData.filter(r => r.attendance === "Sorry, can't make it");
      const afar      = allData.filter(r => r.attendance === "Celebrating from afar");

      // Count total guests from party_names (count lines/commas + 1 for submitter)
      let totalGuests = 0;
      attending.forEach(r => {
        if (r.party_names && r.party_names.trim()) {
          const lines = r.party_names.split(/[\n,]/).filter(l => l.trim());
          totalGuests += lines.length;
        } else {
          totalGuests += 1;
        }
      });

      document.getElementById('stat-total').textContent     = allData.length;
      document.getElementById('stat-attending').textContent = attending.length;
      document.getElementById('stat-declined').textContent  = declined.length;
      document.getElementById('stat-afar').textContent      = afar.length;
      document.getElementById('stat-guests').textContent    = totalGuests;
    }

    function setFilter(filter, btn) {
      activeFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTable();
    }

    function renderTable() {
      const search = document.getElementById('search-input').value.toLowerCase();

      let filtered = allData.filter(r => {
        if (activeFilter === 'yes')  return r.attendance === "Yes, I'll be there";
        if (activeFilter === 'no')   return r.attendance === "Sorry, can't make it";
        if (activeFilter === 'afar') return r.attendance === "Celebrating from afar";
        return true;
      });

      if (search) {
        filtered = filtered.filter(r =>
          (r.name || '').toLowerCase().includes(search) ||
          (r.party_names || '').toLowerCase().includes(search)
        );
      }

      document.getElementById('table-loading').style.display = 'none';

      if (filtered.length === 0) {
        document.getElementById('rsvp-table').style.display = 'none';
        document.getElementById('no-data').style.display    = 'block';
        document.getElementById('no-data').textContent      =
          allData.length === 0 ? 'No responses yet.' : 'No results match your filter.';
        return;
      }

      document.getElementById('rsvp-table').style.display = 'table';
      document.getElementById('no-data').style.display    = 'none';

      const tbody = document.getElementById('table-body');
      tbody.innerHTML = filtered.map((r, i) => {
        const badge =
          r.attendance === "Yes, I'll be there"     ? '<span class="badge yes">Attending</span>' :
          r.attendance === "Sorry, can't make it"   ? '<span class="badge no">Declined</span>'   :
          r.attendance === "Celebrating from afar"  ? '<span class="badge afar">From Afar</span>' :
          r.attendance || '—';

        const date = r.created_at
          ? new Date(r.created_at).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })
          : '—';

        return `<tr>
          <td style="color:#9a6a6a;font-size:0.7rem">${i + 1}</td>
          <td><strong>${r.name || '—'}</strong></td>
          <td style="max-width:200px">${(r.party_names || '—').replace(/\n/g, '<br>')}</td>
          <td>${badge}</td>
          <td>${r.phone || '—'}</td>
          <td style="max-width:180px">${r.address || '—'}</td>
          <td style="max-width:180px">${(r.children || '—').replace(/\n/g, '<br>')}</td>
          <td style="white-space:nowrap;color:#9a6a6a;font-size:0.7rem">${date}</td>
        </tr>`;
      }).join('');
    }
  </script>

</body>
</html>
